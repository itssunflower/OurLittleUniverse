<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Little Universe 💜</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            opacity: 0; /* Initial state for script.js fade-in */
            transition: opacity 1.5s ease;
        }

        .landing-container {
            max-width: 800px;
            padding: 20px;
            z-index: 10;
        }

        .greeting {
            font-size: clamp(2rem, 8vw, 4.5rem);
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--pale) 0%, var(--pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 143, 177, 0.3));
        }

        .sub-text {
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            color: var(--pale);
            margin-bottom: 40px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .pulse-ring {
            position: relative;
            display: inline-block;
        }

        .pulse-ring::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border: 2px solid var(--pink);
            border-radius: 50px;
            animation: ringPulse 2s infinite;
            pointer-events: none;
        }

        @keyframes ringPulse {
            0% { width: 100%; height: 100%; opacity: 0.7; }
            100% { width: 150%; height: 180%; opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <h1 class="greeting">Hey Cookie...<br>I made something for you 💜</h1>
        <p class="sub-text">A little universe, built from everything I feel for you.</p>
        
        <div class="pulse-ring">
            <a href="javascript:void(0)" class="btn-magical" onclick="startJourney(event)">
                Enter Our Little Universe 💌
            </a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function startJourney(e) {
            // Trigger the heart burst from our script.js
            if (typeof createHeartBurst === 'function') {
                createHeartBurst(e);
            }
            
            // Wait a moment for the animation, then navigate
            setTimeout(() => {
                navigateTo('surprise.html');
            }, 1000);
        }
    </script>
</body>
</html>
