<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Always Your Cookie ✨💜</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Dancing+Script:wght@700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .final-card {
            max-width: 600px;
            padding: 60px 40px;
            animation: finalReveal 2.5s ease-out;
            margin-bottom: 30px;
        }

        @keyframes finalReveal {
            0% { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .poem-line {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            line-height: 2;
            color: var(--pale);
            margin-bottom: 30px;
        }

        .thank-you {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: var(--pink);
            text-shadow: 0 0 15px rgba(255, 143, 177, 0.5);
        }

        /* ── HOME NAVIGATION ── */
        .home-nav {
            opacity: 0;
            animation: fadeIn 2s ease-in forwards;
            animation-delay: 3s; /* Appears after the main message */
        }

        @keyframes fadeIn {
            to { opacity: 0.7; }
        }

        .btn-home {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--pale);
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: var(--glass);
            color: var(--white);
            border-color: var(--pink);
            opacity: 1;
        }

        /* ── HIDDEN EASTER EGG ── */
        .secret-star {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 15px;
            height: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 100;
        }

        .secret-star:hover { background: rgba(255, 143, 177, 0.2); }

        .egg-modal {
            position: fixed;
            inset: 0;
            background: rgba(10, 4, 22, 0.9);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .egg-modal.open { display: flex; }

        .egg-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.8rem;
            color: var(--pink);
            animation: eggPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes eggPop {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glass-card final-card">
        <p class="poem-line">
            You send me words...<br>
            but you don't know...<br>
            I keep them like little treasures 💜
        </p>
        
        <h1 class="thank-you">Thank you for being my Cookie ✨💜</h1>
    </div>

    <div class="home-nav">
        <a href="javascript:void(0)" class="btn-home" onclick="navigateTo('index.html')">
            Restart the Magic 🏠
        </a>
    </div>

    <div class="secret-star" onclick="toggleEgg()"></div>

    <div class="egg-modal" id="egg" onclick="toggleEgg()">
        <div class="egg-text">
            If you reached here...<br>
            you matter more than you think 🌌
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function toggleEgg() {
            const modal = document.getElementById('egg');
            modal.classList.toggle('open');
            if (modal.classList.contains('open')) {
                if (typeof createHeartBurst === 'function') {
                    createHeartBurst(); 
                }
            }
        }
    </script>
</body>
</html>
