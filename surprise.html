<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for Cookie 🎀</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&family=Nunito:wght@400&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .gift-container {
            position: relative;
            cursor: pointer;
            width: 200px;
            height: 200px;
            transition: transform 0.3s ease;
        }

        .gift-container:hover {
            transform: scale(1.05);
        }

        /* SVG Box Styling */
        #giftLid {
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
        }

        .instruction {
            margin-top: 30px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: var(--pink);
            letter-spacing: 2px;
            animation: pulseFade 2s infinite;
        }

        @keyframes pulseFade {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .shake {
            animation: shakeBox 0.5s ease-in-out;
        }

        @keyframes shakeBox {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
    </style>
</head>
<body>

    <div class="gift-container" id="giftWrap" onclick="openGift()">
        <svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="80" width="140" height="90" rx="6" fill="#6A4C93" stroke="#E6D9FF" stroke-width="1.5"/>
            <rect id="giftLid" x="12" y="58" width="156" height="30" rx="6" fill="#9B72CF" stroke="#E6D9FF" stroke-width="1.5"/>
            <rect x="83" y="80" width="14" height="90" fill="#FF8FB1" opacity="0.9"/>
            <rect x="12" y="68" width="156" height="10" fill="#FF8FB1" opacity="0.9"/>
            <ellipse cx="68" cy="55" rx="22" ry="14" fill="#FF8FB1" transform="rotate(-30 68 55)" opacity="0.9"/>
            <ellipse cx="112" cy="55" rx="22" ry="14" fill="#FF8FB1" transform="rotate(30 112 55)" opacity="0.9"/>
            <circle cx="90" cy="58" r="8" fill="#ff6b9d"/>
        </svg>
    </div>

    <p class="instruction">click the box to open 🎀</p>

    <script src="script.js"></script>
    <script>
        let isOpened = false;

        function openGift() {
            if (isOpened) return;
            isOpened = true;

            const wrap = document.getElementById('giftWrap');
            const lid = document.getElementById('giftLid');

            // 1. Shake the box
            wrap.classList.add('shake');

            setTimeout(() => {
                // 2. Fly the lid off
                lid.style.transformOrigin = 'left top';
                lid.style.transform = 'translateY(-100px) rotate(-45deg)';
                lid.style.opacity = '0';

                // 3. Trigger hearts and sparkles from script.js
                if (typeof createHeartBurst === 'function') {
                    createHeartBurst(); // Burst from center
                }

                // 4. Smooth transition to next page
                setTimeout(() => {
                    navigateTo('memories.html');
                }, 1500);
            }, 500);
        }
    </script>
</body>
</html>
